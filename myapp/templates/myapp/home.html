{% extends 'myapp/base.html' %}
{% block content %}
<h1 class="text-3xl font-bold tracking-tight mb-2">Student &amp; Course Registration</h1>
<p class="text-slate-500 mb-6">Manage students, courses, and see who's enrolled.</p>
<div class="grid gap-3 sm:grid-cols-3">
    <a href="{% url 'student_register' %}"
       class="block rounded-lg border border-slate-200 p-4 hover:border-indigo-400 hover:bg-indigo-50 transition">
        <div class="font-semibold text-indigo-600">Student Register</div>
        <div class="text-sm text-slate-500 mt-1">Add a new student and enroll in courses.</div>
    </a>
    <a href="{% url 'course_register' %}"
       class="block rounded-lg border border-slate-200 p-4 hover:border-indigo-400 hover:bg-indigo-50 transition">
        <div class="font-semibold text-indigo-600">Course Register</div>
        <div class="text-sm text-slate-500 mt-1">Create a new course offering.</div>
    </a>
    <a href="{% url 'report' %}"
       class="block rounded-lg border border-slate-200 p-4 hover:border-indigo-400 hover:bg-indigo-50 transition">
        <div class="font-semibold text-indigo-600">Report</div>
        <div class="text-sm text-slate-500 mt-1">View students grouped by course.</div>
    </a>
</div>
{% endblock %}
